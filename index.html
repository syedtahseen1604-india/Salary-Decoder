<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Decoder</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
margin-top:20px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
background:#10b981;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
}

.locked{
margin-top:30px;
background:#111827;
padding:20px;
border-radius:10px;
}

.unlock{
background:#f59e0b;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Salary Decoder</h1>
<p>Understand your salary breakdown</p>

<input id="email" placeholder="Enter your email">

<input id="ctc" placeholder="Annual CTC">

<button onclick="calculate()">Calculate Salary</button>

<div class="result" id="result"></div>

<div class="locked">

<h3>Full Tax Report Locked</h3>

<p>Unlock full tax analysis</p>

<button class="unlock" onclick="goToPayment()">Pay ₹99</button>

</div>

</div>

<script>

function calculate(){

const ctc=document.getElementById("ctc").value;

if(!ctc){
alert("Enter CTC");
return;
}

const monthly=ctc/12;

document.getElementById("result").innerHTML=
"Estimated Monthly Salary: ₹"+Math.round(monthly);

}

function goToPayment(){

const email=document.getElementById("email").value;

if(!email){
alert("Enter email first");
return;
}

const paymentURL=
"upi://pay?pa=9347245195@kotak811"+
"&pn=SalaryDecoder"+
"&am=99"+
"&cu=INR"+
"&tn=Salary Decoder Full Report";

window.open(paymentURL,"_blank");

}

</script>

</body>
</html>
